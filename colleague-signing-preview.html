<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Až podepíší kolegové - Zadání_UX UI_Software602</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #fafafa;
            line-height: 1.5;
            color: #1a1a1a;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 13px;
            font-weight: 400;
            color: #999;
            margin: 0 0 30px 70px;
        }

        .header {
            padding: 0 20px 40px 70px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 20px 0;
        }

        .method-description {
            font-size: 16px;
            color: #666;
            margin: 0 0 30px 0;
            line-height: 1.6;
        }

        .colleagues-section {
            background: white;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 20px 0;
        }

        .colleague-item {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .colleague-item:last-child {
            border-bottom: none;
        }

        .colleague-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .colleague-email {
            color: #666;
            font-size: 14px;
            text-decoration: none;
            border-bottom: 1px solid #666;
        }

        .colleague-email:hover {
            color: #007bff;
            border-bottom-color: #007bff;
        }

        .add-colleague {
            color: #007bff;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
            margin-top: 15px;
        }

        .add-colleague:hover {
            text-decoration: underline;
        }

        .footer {
            padding: 40px 30px 20px 70px;
            position: relative;
        }

        .back-link {
            color: #666;
            text-decoration: none;
            font-size: 13px;
            position: absolute;
            left: -80px;
        }

        .back-link:hover {
            color: #1a1a1a;
        }

        .send-button {
            background: #1a1a1a;
            color: #fafafa;
            border: none;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .send-button:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="page-title">Nastavení odesílání dokumentu</h2>

        <div class="header">
            <h1>Až podepíší kolegové</h1>
            <div class="method-description">
                Kontrola 4 a více očí - dokument se odešle až po podpisu všech určených kolegů.
                Zajistí, že dokument prošel interní kontrolou před odesláním protistraně.
            </div>

            <div class="colleagues-section">
                <div class="section-title">Kolegové, kteří musí podepsat</div>

                <div class="colleague-item">
                    <div class="colleague-name">Jan Novák</div>
                    <a href="mailto:jan.novak@example.com" class="colleague-email">jan.novak@example.com</a>
                </div>

                <a href="#" class="add-colleague">+ Přidat dalšího kolegu</a>
            </div>
        </div>

        <div class="footer">
            <a href="#" class="back-link" onclick="window.history.back(); return false;">Zpět</a>
            <button class="send-button">Uložit nastavení</button>
        </div>
    </div>
</body>
</html>
